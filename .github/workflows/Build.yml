name: Build Releases

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux (.deb)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libayatana-appindicator3-dev libkeybinder-3.0-dev patchelf rpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'

      - name: Enable Flutter Linux
        run: flutter config --enable-linux-desktop

      - name: Install Dart dependencies
        run: dart pub get

      - name: Build FlClash Linux App
        run: dart setup.dart linux --arch amd64 --out app

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlClash-Linux-deb
          path: dist/*.deb
